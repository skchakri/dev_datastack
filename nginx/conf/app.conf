server {
  listen 3000;
  server_name localhost;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml text/javascript;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_buffering off;
    proxy_pass http://host.docker.internal:3000;
  }
}

server {
  listen 80;
  server_name kibana.local kibana.test;

  access_log /var/log/nginx/elastic-access.log;
  error_log  /var/log/nginx/elastic-error.log;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "keep-alive";
    proxy_buffering off;
    proxy_pass http://kibana:5601;
  }
}

